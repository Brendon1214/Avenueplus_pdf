<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>查看 PDF</title>

  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      font-family: Arial, sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      background: #f5f5f5;
    }

    header {
      padding: 12px 16px;
      background: white;
      border-bottom: 1px solid #ddd;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    h1 {
      margin: 0;
      font-size: 18px;
    }

    a {
      padding: 9px 14px;
      color: white;
      background: #0969da;
      border-radius: 6px;
      text-decoration: none;
    }

    iframe {
      width: 100%;
      flex: 1;
      border: none;
    }
  </style>
</head>

<body>
  <header>
    <h1>我的 PDF</h1>

    <a href="./Brochure.pdf" target="_blank">
      打开 PDF
    </a>
  </header>

  <iframe src="./Brochure.pdf"></iframe>
</body>
</html>
